<!DOCTYPE html>
<html>
<head>
    <title>My Simple Web Page</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url("https://raw.githubusercontent.com/patpat12mlegends/MyWeb/main/pocoyo.jpg");
            background-size: cover;          /* Makes image cover full screen */
            background-position: center;     /* Center the image */
            background-repeat: no-repeat;    /* Prevent repeating */
            height: 100vh;                   /* Full screen height */
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
        }

        .content {
            padding-top: 20%;
            background: rgba(0, 0, 0, 0.5);  /* Dark overlay */
            height: 100vh;
        }

        h1 {
            font-size: 50px;
        }

        p {
            font-size: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            border: none;
            background-color: #ff6600;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #cc5200;
        }
    </style>
</head>

<body>

    <div class="content">
        <h1>Welcome to My Website</h1>
        <p>This is a simple webpage with a full background image.</p>
        <button>Click Me</button>
    </div>

</body>
</html>
